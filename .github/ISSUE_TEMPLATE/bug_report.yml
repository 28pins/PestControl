name: Bug Report
description: Report a bug so that PestControl can automatically route it to Copilot for a fix.
title: "🐛 [Bug] <short description>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report!
        Once submitted, the **PestControl Copilot Autofix** workflow will assign this issue to the GitHub Copilot coding agent, which will analyze the problem and open a pull request with a proposed fix.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I call `foo()` with an empty list it raises a KeyError instead of returning an empty result."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the bug.
      placeholder: |
        1. Call `foo([])`
        2. Observe the traceback
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Relevant version information (language runtime, OS, package versions, etc.).
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.12.1
        - Package version: 1.2.3
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or log snippets here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: hints
    attributes:
      label: Hints for Copilot (optional)
      description: |
        If you have an idea where the bug might be, list relevant files, functions, or hypotheses here.
        The Copilot coding agent will use this as a starting point.
      placeholder: |
        - The bug is likely in `src/parser.py`, function `parse_tokens()`
        - The edge case is when the input list is empty
    validations:
      required: false
